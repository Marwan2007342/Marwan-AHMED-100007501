version: "3.8"

# ─────────────────────────────────────────────────────────────────
#  Ink Marker Production Line  –  Docker Compose Stack
#  Services:  influxdb  |  grafana  |  app (Pygame HMI)
# ─────────────────────────────────────────────────────────────────

services:

  # ── InfluxDB 2.x ─────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: marker_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    marker_admin_2026
      DOCKER_INFLUXDB_INIT_ORG:         marker_org
      DOCKER_INFLUXDB_INIT_BUCKET:      marker_production
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: marker_admin_token_2026
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - marker_net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: marker_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: marker_grafana_2026
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: >
        /etc/grafana/provisioning/dashboards/marker_production.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - marker_net
    depends_on:
      influxdb:
        condition: service_healthy

  # ── Python / Pygame HMI (optional headless container) ──────────
  app:
    profiles: ["hmi"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marker_hmi
    restart: unless-stopped
    environment:
      INFLUX_URL:    http://influxdb:8086
      INFLUX_TOKEN:  marker_admin_token_2026
      INFLUX_ORG:    marker_org
      INFLUX_BUCKET: marker_production
    networks:
      - marker_net
    depends_on:
      influxdb:
        condition: service_healthy

# ── Named Volumes ─────────────────────────────────────────────────
volumes:
  influxdb_data:
  grafana_data:

# ── Network ───────────────────────────────────────────────────────
networks:
  marker_net:
    driver: bridge
